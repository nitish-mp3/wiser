name: Wiser MQTT Bridge
version: "1.0.2"
slug: wiser_bridge
description: Production-ready bridge for Schneider Wiser devices to Home Assistant via MQTT
url: "https://github.com/nitish-mp3/wiser"
startup: services
boot: auto
init: false

arch:
  - aarch64
  - amd64
  - armv7

options:
  wiser_hub_ip: ""
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""

schema:
  wiser_hub_ip: str
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str?
  mqtt_password: str?

services:
  - mqtt:need
